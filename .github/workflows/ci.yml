name: CI/CD Pipeline

# Kích hoạt pipeline khi có Push hoặc Pull Request vào nhánh main
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # ---------------------------------------------
  # GIAI ĐOẠN 1: TÍCH HỢP LIÊN TỤC (CI)
  # ---------------------------------------------
  build-and-test:
    runs-on: ubuntu-latest

    # Khởi tạo Database tạm thời để chạy Test
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: devops_user
          POSTGRES_PASSWORD: devops_password
          POSTGRES_DB: devops_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Lấy mã nguồn về
        uses: actions/checkout@v4

      - name: Cài đặt Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Cài đặt thư viện và Chạy Test (Backend)
        run: |
          cd backend
          npm ci
          npm test
        env:
          DB_HOST: localhost
          DB_USER: devops_user
          DB_PASSWORD: devops_password
          DB_NAME: devops_db
          DB_PORT: 5432

      - name: Đăng nhập vào Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build và Push ảnh Docker (Backend)
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/devops-backend:latest ./backend
          docker push ${{ secrets.DOCKER_USERNAME }}/devops-backend:latest

      - name: Build và Push ảnh Docker (Frontend)
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/devops-frontend:latest ./frontend
          docker push ${{ secrets.DOCKER_USERNAME }}/devops-frontend:latest

  # ---------------------------------------------
  # GIAI ĐOẠN 2: TRIỂN KHAI LIÊN TỤC (CD)
  # ---------------------------------------------
  deploy:
    needs: build-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Triển khai lên Server qua SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: 22
          script: |
            cd devops-project-hcm
            git pull origin main
            docker-compose pull
            docker-compose up -d