name: CI/CD Pipeline

on:
  push:
    branches: [ "main", "feature/setup-cicd-pipeline" ]
  pull_request:
    branches: [ "main" ]

# Thêm biến này ở mức toàn cục để tắt cảnh báo Node 20
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: devops_user
          POSTGRES_PASSWORD: devops_password
          POSTGRES_DB: devops_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Lấy mã nguồn về
        uses: actions/checkout@v4

      - name: Cài đặt Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: '**/package-lock.json'

      - name: Cài đặt thư viện và Chạy Test (Backend)
        env:
          DB_HOST: localhost
          DB_USER: devops_user
          DB_PASSWORD: devops_password
          DB_NAME: devops_db
          DB_PORT: 5432
          PGPASSWORD: devops_password
          NODE_ENV: test # THÊM DÒNG NÀY VÀO ĐÂY
        run: |
          psql -h localhost -U devops_user -d devops_db -f database/database.sql
          cd backend
          npm ci 
          npx jest --passWithNoTests --forceExit --detectOpenHandles

      - name: Đăng nhập vào Docker Hub
        if: success()
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build và Push ảnh Docker (Backend)
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/devops-backend:latest ./backend
          docker push ${{ secrets.DOCKER_USERNAME }}/devops-backend:latest

      - name: Build và Push ảnh Docker (Frontend)
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/devops-frontend:latest ./frontend
          docker push ${{ secrets.DOCKER_USERNAME }}/devops-frontend:latest

  deploy:
    needs: build-and-test
    # SỬA Ở ĐÂY: Cho phép chạy khi push lên bất kỳ nhánh nào trong danh sách trên
    if: github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: Triển khai lên Server qua SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: 22
          script: |
            cd ~/devops-project-hcm
            git fetch origin
            git checkout main
            git pull origin main
            
            # LỆNH MỚI: Dừng tất cả container đang chạy để giải phóng port 8080
            docker stop $(docker ps -aq) || true
            docker rm $(docker ps -aq) || true
            
            # Dọn dẹp theo compose
            docker-compose down --remove-orphans
            
            # Kéo ảnh và chạy lại
            docker-compose pull
            docker-compose up -d --force-recreate