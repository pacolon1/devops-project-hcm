name: CI/CD Pipeline

on:
  push:
    # Thêm nhánh bạn đang làm vào đây để pipeline kích hoạt ngay lập tức
    branches: [ "main", "feature/setup-cicd-pipeline" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: devops_user
          POSTGRES_PASSWORD: devops_password
          POSTGRES_DB: devops_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Lấy mã nguồn về
        uses: actions/checkout@v4

      - name: Cài đặt Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Cài đặt thư viện và Chạy Test (Backend)
        env:
          DB_HOST: localhost
          DB_USER: devops_user
          DB_PASSWORD: devops_password
          DB_NAME: devops_db
          DB_PORT: 5432
          PGPASSWORD: devops_password
        run: |
          # 1. Đợi DB sẵn sàng và đổ dữ liệu
          psql -h localhost -U devops_user -d devops_db -f database/database.sql
          
          # 2. Test Backend
          cd backend
          npm ci
          npm test

      - name: Đăng nhập vào Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build và Push ảnh Docker (Backend)
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/devops-backend:latest ./backend
          docker push ${{ secrets.DOCKER_USERNAME }}/devops-backend:latest

      - name: Build và Push ảnh Docker (Frontend)
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/devops-frontend:latest ./frontend
          docker push ${{ secrets.DOCKER_USERNAME }}/devops-frontend:latest

  deploy:
    needs: build-and-test
    # Sửa điều kiện if để cho phép deploy từ nhánh feature của bạn
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/feature/setup-cicd-pipeline')
    runs-on: ubuntu-latest

    steps:
      - name: Triển khai lên Server qua SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: 22
          script: |
            cd devops-project-hcm
            # Cập nhật đúng nhánh đang làm việc
            git fetch origin
            git checkout ${{ github.ref_name }}
            git pull origin ${{ github.ref_name }}
            docker-compose pull
            docker-compose up -d