version: '3.8'

services:
  # 1. DATABASE SERVICE
  postgres:
    image: postgres:15-alpine
    container_name: devops_postgres
    environment:
      POSTGRES_USER: devops_user
      POSTGRES_PASSWORD: devops_password
      POSTGRES_DB: devops_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Mount file init.sql từ thư mục database vào trong container để tạo bảng tự động
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U devops_user -d devops_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 2. BACKEND SERVICE
  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: devops_backend
    ports:
      - "8080:8080"
    environment:
      - DB_HOST=postgres
      - DB_USER=devops_user
      - DB_PASSWORD=devops_password
      - DB_NAME=devops_db
      - DB_PORT=5432
    depends_on:
      postgres:
        condition: service_healthy

  # 3. FRONTEND SERVICE
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: devops_frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend

# Khai báo volume để dữ liệu database không bị mất khi tắt container
volumes:
  postgres_data: